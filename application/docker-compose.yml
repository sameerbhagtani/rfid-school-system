services:
    mongodb:
        image: mongo:8
        container_name: rfid-school-system-mongodb
        restart: unless-stopped

        ports:
            - "27017:27017"

        environment:
            MONGO_INITDB_ROOT_USERNAME: user
            MONGO_INITDB_ROOT_PASSWORD: password
            MONGO_INITDB_DATABASE: rfid_school_system_db

        volumes:
            - mongodb_data:/data/db

volumes:
    mongodb_data:
        name: rfid-school-system-mongodb-data
